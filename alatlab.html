<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alat-Alat Laboratorium</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --tool-card-size: 108px;
            --preview-height: 185px;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: Arial, Helvetica, sans-serif;
            background: #dff3ff;
        }

        .stage {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            background-image: url("assets/BG alat-alat lab.png");
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
        }



        /* TOMBOL MUSIK DISAMAKAN DENGAN HALAMAN HOME */
        .music-btn {
            position: absolute;
            left: 22px;
            top: 18px;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, .95);
            background: radial-gradient(circle at 30% 30%, #7fe3ff, #1b84c7 70%, #0b5e95);
            box-shadow: 0 18px 28px rgba(0, 0, 0, .35);
            cursor: pointer;
            display: grid;
            place-items: center;
            z-index: 80;
        }

        .music-btn:active {
            transform: scale(.98);
        }

        .music-btn.off {
            opacity: 0.55;
        }

        .music-btn svg {
            width: 34px;
            height: 34px;
            fill: #fff;
        }

        .close-btn {
            position: absolute;
            top: 34px;
            right: 46px;
            width: 72px;
            height: 72px;
            border: 0;
            border-radius: 50%;
            background: linear-gradient(#72c3ff, #4098ea);
            color: #ffffff;
            font-size: 46px;
            font-weight: 900;
            line-height: 72px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 8px 0 #2c67bd, 0 12px 20px rgba(0, 0, 0, .22);
            z-index: 50;
        }

        .close-btn:hover {
            transform: translateY(2px);
            box-shadow: 0 6px 0 #2c67bd, 0 10px 18px rgba(0, 0, 0, .20);
        }

        .content-area {
            position: absolute;
            left: 70px;
            right: 80px;
            top: 155px;
            bottom: 34px;
            z-index: 10;
        }

        .main-panel {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: rgba(255, 255, 255, .94);
            border: 5px solid #8ec8f7;
            border-radius: 30px;
            box-shadow: 0 8px 20px rgba(45, 108, 169, .18);
            padding: 18px 28px 22px;
            display: flex;
            flex-direction: column;
        }

        .panel-head {
            text-align: center;
            margin-bottom: 8px;
            flex: 0 0 auto;
        }

        .panel-head h2 {
            margin: 0;
            color: #1f5c9e;
            font-size: 36px;
            font-weight: 900;
            line-height: 1.05;
        }

        .panel-head p {
            margin: 6px 0 0;
            color: #14375d;
            font-size: 15px;
            font-weight: 700;
        }

        .tool-grid {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(2, 1fr);
            align-items: center;
            justify-items: center;
            row-gap: 6px;
            margin: 0 0 12px;
        }

        .tool-card {
            width: var(--tool-card-size);
            height: var(--tool-card-size);
            border: 0;
            border-radius: 20px;
            padding: 8px;
            background: transparent;
            cursor: pointer;
            transition: transform .18s ease, filter .18s ease, background .18s ease, outline .18s ease;
        }

        .tool-card:hover {
            transform: translateY(-5px) scale(1.04);
            filter: drop-shadow(0 10px 10px rgba(0, 0, 0, .18));
            background: rgba(234, 246, 255, .95);
        }

        .tool-card:active {
            transform: translateY(0) scale(.98);
        }

        .tool-card.active {
            transform: translateY(-3px) scale(1.03);
            filter: drop-shadow(0 0 12px rgba(64, 152, 234, .65));
            background: #eaf6ff;
            outline: 4px solid #8ec8f7;
        }

        .tool-card img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            user-select: none;
            pointer-events: none;
            transform: scale(1.15);
        }

        .preview-area {
            height: var(--preview-height);
            flex: 0 0 var(--preview-height);
            display: grid;
            grid-template-columns: 140px 150px 1fr;
            gap: 18px;
            align-items: center;
            padding: 12px 24px;
            border: 4px solid #9acaf8;
            border-radius: 24px;
            background: #eaf6ff;
            overflow: hidden;
        }

        .preview-animasi,
        .preview-real {
            display: flex;
            align-items: center;
            justify-content: center;
            justify-self: center;
        }

        .preview-animasi {
            width: 100px;
            height: 140px;
        }

        .preview-real {
            width: 100px;
            height: 140px;
        }

        .preview-animasi img,
        .preview-real img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            user-select: none;
            pointer-events: none;
        }

        .preview-text {
            min-width: 0;
        }

        .preview-text h3 {
            margin: 0 0 8px;
            color: #1f5c9e;
            font-size: 30px;
            font-weight: 900;
            line-height: 1.05;
        }

        .preview-text p {
            margin: 0 0 8px;
            color: #14375d;
            font-size: 16px;
            font-weight: 700;
            line-height: 1.32;
        }

        .preview-text .note {
            margin-bottom: 0;
            color: #0d3b66;
            font-size: 16px;
            font-weight: 800;
        }

        @media (max-width: 1366px) {
            :root {
                --tool-card-size: 100px;
                --preview-height: 170px;
            }

            .close-btn {
                top: 28px;
                right: 38px;
                width: 64px;
                height: 64px;
                font-size: 40px;
                line-height: 64px;
            }

            .content-area {
                left: 58px;
                right: 62px;
                top: 128px;
                bottom: 28px;
            }

            .main-panel {
                padding: 16px 22px 18px;
            }

            .panel-head {
                margin-bottom: 6px;
            }

            .panel-head h2 {
                font-size: 30px;
            }

            .panel-head p {
                font-size: 13px;
            }

            .tool-grid {
                row-gap: 2px;
                margin-bottom: 10px;
            }

            .tool-card {
                padding: 7px;
            }

            .preview-area {
                grid-template-columns: 120px 135px 1fr;
                gap: 14px;
                padding: 10px 18px;
            }

            .preview-animasi {
                width: 95px;
                height: 125px;
            }

            .preview-real {
                width: 85px;
                height: 125px;
            }

            .preview-text h3 {
                font-size: 25px;
                margin-bottom: 6px;
            }

            .preview-text p {
                font-size: 14px;
                line-height: 1.28;
                margin-bottom: 6px;
            }

            .preview-text .note {
                font-size: 13px;
            }
        }

        @media (max-height: 760px) {
            :root {
                --tool-card-size: 92px;
                --preview-height: 155px;
            }

            .content-area {
                top: 135px;
                bottom: 24px;
            }

            .main-panel {
                padding: 14px 22px 16px;
            }

            .panel-head {
                margin-bottom: 4px;
            }

            .panel-head h2 {
                font-size: 30px;
            }

            .panel-head p {
                font-size: 13px;
            }

            .tool-grid {
                row-gap: 0;
                margin-bottom: 8px;
            }

            .preview-area {
                grid-template-columns: 110px 125px 1fr;
                gap: 12px;
                padding: 8px 16px;
            }

            .preview-animasi {
                width: 78px;
                height: 112px;
            }

            .preview-real {
                width: 78px;
                height: 112px;
            }

            .preview-text h3 {
                font-size: 24px;
                margin-bottom: 5px;
            }

            .preview-text p {
                font-size: 13.5px;
                line-height: 1.25;
                margin-bottom: 5px;
            }

            .preview-text .note {
                font-size: 13px;
            }
        }

        @media (max-width: 1100px) and (orientation: portrait) {

            html,
            body {
                overflow: auto;
            }

            .stage {
                min-height: 100vh;
                height: auto;
                overflow: visible;
            }

            .content-area {
                position: relative;
                left: auto;
                right: auto;
                top: auto;
                bottom: auto;
                width: calc(100% - 40px);
                margin: 120px auto 24px;
            }

            .main-panel {
                height: auto;
                min-height: 850px;
            }

            .tool-grid {
                height: auto;
                flex: 0 0 auto;
                grid-template-columns: repeat(3, var(--tool-card-size));
                grid-template-rows: auto;
                gap: 12px;
                padding: 10px 0;
            }

            .preview-area {
                height: auto;
                flex: 0 0 auto;
                grid-template-columns: 1fr;
                justify-items: center;
                text-align: center;
                padding: 18px 14px;
            }
        }


        /* MODE LANDSCAPE HP: RAPAT, RAPI, DAN TIDAK TERPOTONG */
        @media (max-height: 500px) and (orientation: landscape) {
            :root {
                --tool-card-size: clamp(50px, 8.6vw, 70px);
                --preview-height: clamp(94px, 30vh, 124px);
            }

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
            }

            body {
                width: 100vw;
                height: 100vh;
                height: 100dvh;
            }

            .stage {
                width: 100vw;
                height: 100vh;
                height: 100dvh;
                overflow: hidden;
                background-size: 100% 100%;
                background-position: center center;
            }

            .music-btn {
                width: 46px;
                height: 46px;
                left: 12px;
                top: 10px;
                border-width: 3px;
                box-shadow: 0 10px 18px rgba(0, 0, 0, .32);
            }

            .music-btn svg {
                width: 22px;
                height: 22px;
            }

            .close-btn {
                top: 21px;
                right: 44px;
                width: 38px;
                height: 38px;
                line-height: 38px;
                font-size: 26px;
                box-shadow: 0 4px 0 #2c67bd, 0 7px 10px rgba(0, 0, 0, 0.20);
            }

            .content-area {
                position: absolute;
                left: clamp(24px, 4.5vw, 40px);
                right: clamp(24px, 4.5vw, 42px);
                top: clamp(70px, 21vh, 82px);
                bottom: clamp(5px, 2vh, 12px);
                width: auto;
                margin: 0;
                z-index: 10;
            }

            .main-panel {
                height: 100%;
                min-height: 0;
                padding: 6px 10px 7px;
                border-width: 3px;
                border-radius: 18px;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            .panel-head {
                margin-bottom: 3px;
                flex: 0 0 auto;
            }

            .panel-head h2 {
                font-size: clamp(15px, 2.8vw, 18px);
                line-height: 1.05;
            }

            .panel-head p {
                margin-top: 2px;
                font-size: clamp(7px, 1.25vw, 8.4px);
                line-height: 1.2;
            }

            .tool-grid {
                flex: 0 0 calc((var(--tool-card-size) * 2) + 4px);
                min-height: 0;
                display: grid;
                grid-template-columns: repeat(5, minmax(0, 1fr));
                grid-template-rows: repeat(2, minmax(0, 1fr));
                column-gap: clamp(2px, .9vw, 8px);
                row-gap: 2px;
                align-items: center;
                justify-items: center;
                margin: 0 0 4px;
                padding: 0;
            }

            .tool-card {
                width: var(--tool-card-size);
                height: var(--tool-card-size);
                padding: 3px;
                border-radius: 10px;
            }

            .tool-card img {
                transform: scale(1.32);
            }

            .tool-card.active {
                outline: 2px solid #8ec8f7;
            }

            .preview-area {
                height: var(--preview-height);
                flex: 0 0 var(--preview-height);
                grid-template-columns: clamp(58px, 11vw, 82px) clamp(58px, 11vw, 82px) 1fr;
                gap: clamp(6px, 1.3vw, 10px);
                padding: 6px 10px;
                border-width: 3px;
                border-radius: 16px;
                overflow: hidden;
            }

            .preview-animasi,
            .preview-real {
                width: clamp(48px, 9vw, 66px);
                height: clamp(64px, 22vh, 88px);
            }

            .preview-text h3 {
                font-size: clamp(12.5px, 2.35vw, 16px);
                margin-bottom: 3px;
                line-height: 1.1;
            }

            .preview-text p {
                font-size: clamp(7.4px, 1.35vw, 9px);
                line-height: 1.25;
                margin-bottom: 3px;
            }

            .preview-text .note {
                font-size: clamp(7.2px, 1.3vw, 8.8px);
                line-height: 1.25;
            }
        }

        /* LANDSCAPE HP SANGAT PENDEK, CONTOH 604 x 320 DAN 740 x 360 */
        @media (max-height: 390px) and (orientation: landscape) {
            :root {
                --tool-card-size: clamp(48px, 8.4vw, 62px);
                --preview-height: clamp(92px, 29vh, 106px);
            }

            .content-area {
                top: 70px;
                left: clamp(24px, 4vw, 32px);
                right: clamp(24px, 4.2vw, 34px);
                bottom: 6px;
            }

            .main-panel {
                padding: 5px 9px 6px;
            }

            .panel-head {
                margin-bottom: 2px;
            }

            .panel-head h2 {
                font-size: 15px;
            }

            .panel-head p {
                font-size: 7.2px;
            }

            .tool-grid {
                flex-basis: calc((var(--tool-card-size) * 2) + 2px);
                margin-bottom: 3px;
                column-gap: 2px;
                row-gap: 0;
            }

            .tool-card {
                padding: 2px;
            }

            .tool-card img {
                transform: scale(1.36);
            }

            .preview-area {
                grid-template-columns: 64px 66px 1fr;
                gap: 7px;
                padding: 5px 8px;
            }

            .preview-animasi,
            .preview-real {
                width: 54px;
                height: 74px;
            }

            .preview-text h3 {
                font-size: 12.6px;
            }

            .preview-text p {
                font-size: 7.6px;
            }

            .preview-text .note {
                font-size: 7.4px;
            }

            .close-btn {
                top: 18px;
                right: 42px;
                width: 34px;
                height: 34px;
                line-height: 34px;
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <!-- SOUND -->
    <audio id="bgMusic" src="sound/BACKSOUND VIRTUAL LAB.mp3" loop preload="auto"></audio>
    <audio id="clickSound" src="sound/SUARA KLIK.mp3" preload="auto"></audio>

    <div class="stage">
        <button class="music-btn off" id="musicBtn" title="Music" type="button" aria-label="Music">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3v10.55A4 4 0 1 0 14 17V7h6V3h-8z" />
            </svg>
        </button>

        <button class="close-btn" id="closeBtn" type="button" aria-label="Kembali ke Pra-Lab">×</button>

        <main class="content-area">
            <section class="main-panel">
                <div class="panel-head">
                    <h2>Peralatan Laboratorium Kimia</h2>
                    <p>Pilih salah satu alat laboratorium berikut untuk melihat nama, bentuk asli, dan fungsinya.</p>
                </div>

                <div class="tool-grid">
                    <button class="tool-card active" type="button" onclick="showTool('labuUkur', this)"
                        aria-label="Labu ukur">
                        <img src="alatlab/animasi/labu ukur (1).png" alt="Labu Ukur">
                    </button>

                    <button class="tool-card" type="button" onclick="showTool('corongKaca', this)"
                        aria-label="Corong kaca">
                        <img src="alatlab/animasi/corong kaca (1).png" alt="Corong Kaca">
                    </button>

                    <button class="tool-card" type="button" onclick="showTool('beakerGlass', this)"
                        aria-label="Beaker glass">
                        <img src="alatlab/animasi/beaker glass (1).png" alt="Beaker Glass">
                    </button>

                    <button class="tool-card" type="button" onclick="showTool('tabungReaksi', this)"
                        aria-label="Rak dan tabung reaksi">
                        <img src="alatlab/animasi/rak dan tabung reaksi (1).png" alt="Rak dan Tabung Reaksi">
                    </button>

                    <button class="tool-card" type="button" onclick="showTool('mortar', this)"
                        aria-label="Alu dan mortar">
                        <img src="alatlab/animasi/alu dan mortar (1).png" alt="Alu dan Mortar">
                    </button>

                    <button class="tool-card" type="button" onclick="showTool('kawatKasa', this)"
                        aria-label="Kawat kasa">
                        <img src="alatlab/animasi/kawat kasa (1).png" alt="Kawat Kasa">
                    </button>

                    <button class="tool-card" type="button" onclick="showTool('gelasUkur', this)"
                        aria-label="Gelas ukur">
                        <img src="alatlab/animasi/gelas ukur (1).png" alt="Gelas Ukur">
                    </button>

                    <button class="tool-card" type="button" onclick="showTool('kacaArloji', this)"
                        aria-label="Kaca arloji">
                        <img src="alatlab/animasi/kaca arloji (1).png" alt="Kaca Arloji">
                    </button>

                    <button class="tool-card" type="button" onclick="showTool('indikatorPh', this)"
                        aria-label="Indikator pH">
                        <img src="alatlab/animasi/Indikator pH (1).png" alt="Indikator pH">
                    </button>

                    <button class="tool-card" type="button" onclick="showTool('stopwatch', this)"
                        aria-label="Stopwatch">
                        <img src="alatlab/animasi/stopwatch (1).png" alt="Stopwatch">
                    </button>
                </div>

                <div class="preview-area">
                    <div class="preview-animasi">
                        <img id="previewAnimasiImg" src="alatlab/animasi/labu ukur (1).png"
                            alt="Gambar animasi alat laboratorium">
                    </div>

                    <div class="preview-real">
                        <img id="previewRealImg" src="alatlab/real/labu ukur real (1).png"
                            alt="Gambar asli alat laboratorium">
                    </div>

                    <div class="preview-text">
                        <h3 id="previewTitle">Labu Ukur</h3>
                        <p id="previewDesc">
                            Labu ukur digunakan untuk membuat larutan dengan volume tertentu secara lebih teliti.
                        </p>
                        <p class="note" id="previewNote">
                            Gunakan labu ukur sesuai tanda batas volume yang tertera pada leher labu.
                        </p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const musicBtn = document.getElementById("musicBtn");
        const closeBtn = document.getElementById("closeBtn");
        const bgMusic = document.getElementById("bgMusic");
        const clickSound = document.getElementById("clickSound");

        let musicOn = false;

        bgMusic.volume = 0.45;
        clickSound.volume = 1;

        function playClickSound() {
            const sound = clickSound.cloneNode();
            sound.volume = 1;
            sound.currentTime = 0;
            sound.play().catch(() => { });
        }

        function playBgMusic() {
            bgMusic.play().then(() => {
                musicOn = true;
                musicBtn.classList.remove("off");
            }).catch(() => {
                musicOn = false;
                musicBtn.classList.add("off");
            });
        }

        function pauseBgMusic() {
            bgMusic.pause();
            musicOn = false;
            musicBtn.classList.add("off");
        }

        musicBtn.addEventListener("click", () => {
            playClickSound();
            if (musicOn) {
                pauseBgMusic();
            } else {
                playBgMusic();
            }
        });

        closeBtn.addEventListener("click", () => {
            playClickSound();
            setTimeout(() => {
                window.location.href = "pralab.html";
            }, 350);
        });

        const toolData = {
            labuUkur: {
                title: "Labu Ukur",
                desc: "Labu ukur digunakan untuk membuat larutan dengan volume tertentu secara lebih teliti.",
                note: "Gunakan labu ukur sesuai tanda batas volume yang tertera pada leher labu.",
                animasi: "alatlab/animasi/labu ukur (1).png",
                real: "alatlab/real/labu ukur real (1).png"
            },
            corongKaca: {
                title: "Corong Kaca",
                desc: "Corong kaca digunakan untuk membantu menuangkan cairan ke wadah bermulut kecil agar tidak tumpah.",
                note: "Corong juga dapat digunakan bersama kertas saring dalam proses penyaringan.",
                animasi: "alatlab/animasi/corong kaca (1).png",
                real: "alatlab/real/corong kaca real (1).png"
            },
            beakerGlass: {
                title: "Beaker Glass",
                desc: "Beaker glass digunakan sebagai wadah untuk menampung, mencampur, atau memanaskan larutan.",
                note: "Skala pada beaker glass bersifat perkiraan, bukan untuk pengukuran yang sangat teliti.",
                animasi: "alatlab/animasi/beaker glass (1).png",
                real: "alatlab/real/gelas beaker real (1).png"
            },
            tabungReaksi: {
                title: "Rak dan Tabung Reaksi",
                desc: "Tabung reaksi digunakan untuk mereaksikan atau memanaskan bahan dalam jumlah kecil, sedangkan rak digunakan untuk menaruh tabung reaksi.",
                note: "Gunakan penjepit tabung reaksi saat memanaskan tabung agar lebih aman.",
                animasi: "alatlab/animasi/rak dan tabung reaksi (1).png",
                real: "alatlab/real/rak dan tabung reaksi real (1).png"
            },
            mortar: {
                title: "Alu dan Mortar",
                desc: "Alu dan mortar digunakan untuk menghaluskan atau menumbuk bahan padat menjadi ukuran yang lebih kecil.",
                note: "Bersihkan mortar setelah digunakan agar tidak terjadi kontaminasi bahan.",
                animasi: "alatlab/animasi/alu dan mortar (1).png",
                real: "alatlab/real/alu dan mortar real (1).png"
            },
            kawatKasa: {
                title: "Kawat Kasa",
                desc: "Kawat kasa digunakan sebagai alas saat memanaskan gelas kimia di atas kaki tiga agar panas tersebar merata.",
                note: "Pastikan kawat kasa diletakkan stabil sebelum proses pemanasan dimulai.",
                animasi: "alatlab/animasi/kawat kasa (1).png",
                real: "alatlab/real/kawat kasa real (1).png"
            },
            gelasUkur: {
                title: "Gelas Ukur",
                desc: "Gelas ukur digunakan untuk mengukur volume cairan dengan ketelitian sedang.",
                note: "Baca skala pada posisi sejajar dengan meniskus cairan agar hasil lebih tepat.",
                animasi: "alatlab/animasi/gelas ukur (1).png",
                real: "alatlab/real/gelas ukur real (1).png"
            },

        function showTool(type, button) {
            playClickSound();

            const data = toolData[type];

            document.getElementById("previewTitle").textContent = data.title;
            document.getElementById("previewDesc").textContent = data.desc;
            document.getElementById("previewNote").textContent = data.note;
            document.getElementById("previewAnimasiImg").src = data.animasi;
            document.getElementById("previewRealImg").src = data.real;

            document.querySelectorAll(".tool-card").forEach(card => {
                card.classList.remove("active");
            });

            button.classList.add("active");
        }
    </script>
