<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulasi Buffer - Halaman 3</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        body {
            background: #dbeeff;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        .bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center center;
            display: block;
            z-index: 0;
        }

        .container>*:not(.bg) {
            z-index: 1;
        }


        /* SOUND */
        .music-btn {
            position: absolute;
            left: 22px;
            top: 18px;
            width: 62px;
            height: 62px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, .95);
            background: radial-gradient(circle at 30% 30%, #7fe3ff, #1b84c7 70%, #0b5e95);
            box-shadow: 0 16px 26px rgba(0, 0, 0, .35);
            cursor: pointer;
            display: grid;
            place-items: center;
            z-index: 120;
        }

        .music-btn:active {
            transform: scale(.96);
        }

        .music-btn.off {
            opacity: .55;
        }

        .music-btn svg {
            width: 30px;
            height: 30px;
            fill: #fff;
        }

        /* BOX kiri */
        .box-percobaan {
            position: absolute;
            top: 34px;
            left: 104px;
            width: 300px;
            padding: 16px 14px;
            background: rgba(255, 255, 255, 0.93);
            border: 2px solid rgba(0, 0, 0, 0.28);
            text-align: center;
            font-size: 20px;
            line-height: 1.2;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
        }

        .box-percobaan strong {
            display: block;
            margin-top: 8px;
            font-weight: 900;
            letter-spacing: .3px;
        }

        /* BOX tengah */
        .box-reaksi {
            position: absolute;
            top: 40px;
            left: 55%;
            transform: translateX(-50%);
            width: 280px;
            height: 90px;
            padding: 16px 22px;
            background: rgba(255, 255, 255, 0.93);
            border: 2px solid #6fb35d;
            border-radius: 26px;
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.10);
        }

        .box-reaksi .title {
            font-size: 16px;
            margin: 0 0 6px 0;
            font-weight: 800;
        }

        .rx-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            font-size: 15px;
            margin-top: 2px;
            font-weight: 800;
        }

        .rx-row .plus {
            font-weight: 900;
        }

        .mol-row {
            display: none;
        }

        .mol-card {
            position: absolute;
            top: -105px;
            left: 90%;
            transform: translateX(-50%);
            width: 105px;
            height: 82px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 72;
            pointer-events: none;
        }

        .mol-card img {
            width: 105px;
            height: 82px;
            object-fit: contain;
            filter: drop-shadow(0 6px 10px rgba(0, 0, 0, 0.12));
        }

        /* TOMBOL NAVIGASI / PERINTAH */
        .instruction-box {
            position: absolute;
            left: 610px;
            top: 190px;
            width: 380px;
            min-height: 58px;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.78);
            border: 2px solid rgba(0, 70, 90, 0.85);
            border-radius: 18px;
            color: #111;
            font-size: 18px;
            font-weight: 600;
            line-height: 1.25;
            z-index: 85;
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.12);
        }

        .instruction-box span {
            display: block;
        }

        /* PH scale kanan */
        .ph-wrap {
            position: absolute;
            top: 20px;
            right: 55px;
            width: 70px;
            height: 520px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            z-index: 60;
        }

        .ph-scale {
            height: 520px;
            width: 34px;
            border: 2px solid rgba(0, 0, 0, 0.30);
            overflow: hidden;
            /* warna trayek pH disamakan dengan referensi, posisi tetap vertikal */
            background: linear-gradient(to bottom,
                    #f01818 0%,
                    #ff4b00 7%,
                    #ff9800 14%,
                    #fff000 21%,
                    #c7f43b 28%,
                    #75c943 36%,
                    #39b54a 43%,
                    #34b65a 50%,
                    #22bfa2 57%,
                    #20b8d0 64%,
                    #2697d4 71%,
                    #2b62b8 78%,
                    #3949ab 85%,
                    #4b2ca3 92%,
                    #5b2ca0 100%);
            box-shadow: 0 12px 18px rgba(0, 0, 0, 0.10);
            border-radius: 4px;
        }

        .ph-numbers {
            position: absolute;
            left: -24px;
            top: 0px;
            height: 520px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 12px;
            color: #333;
            opacity: .85;
        }

        .ph-arrow {
            position: absolute;
            top: 0px;
            right: 40px;
            width: 0;
            height: 0;
            border-top: 10px solid transparent;
            border-bottom: 10px solid transparent;
            border-right: 18px solid #d60000;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.15));
            transition: top .6s ease;
        }

        .ph-value {
            position: absolute;
            right: 40px;
            bottom: 90px;
            width: 150px;
            padding: 10px 12px;
            text-align: center;
            background: rgba(255, 255, 255, 0.92);
            border: 2px solid rgba(255, 102, 0, 0.55);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
            font-weight: 900;
            font-size: 18px;
            z-index: 60;
        }

        /* BOTOL kiri bawah */
        .botol-area {
            position: absolute;
            left: 50px;
            bottom: 10px;
            display: flex;
            gap: 20px;
            align-items: flex-end;
            z-index: 50;
        }

        .botol-item {
            width: 100px;
            text-align: center;
            position: relative;
        }

        .botol {
            width: 180px;
            display: block;
            margin: auto;
            cursor: pointer;
            transition: .2s;
            transform-origin: 75% 85%;
            filter: drop-shadow(0 10px 12px rgba(0, 0, 0, 0.10));
            pointer-events: auto;
            position: relative;
            z-index: 60;
        }

        .kons-badge {
            position: absolute;
            top: -20px;
            left: 90%;
            transform: translateX(-50%);
            padding: 4px 18px;
            background: rgba(255, 255, 255, 0.92);
            border: 2px solid rgba(0, 0, 0, 0.18);
            border-radius: 14px;
            font-weight: 900;
            color: #444;
            font-size: 16px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.08);
            z-index: 70;
            pointer-events: none;
        }

        /* BEAKER BESAR */
        .big-wrap {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 120px;
            width: 800px;
            height: 350px;
            z-index: 20;
        }

        .big-beaker-pos {
            position: absolute;
            left: 30%;
            bottom: 0;
            transform: translateX(-50%);
            width: 650px;
            z-index: 20;
            pointer-events: auto;
        }

        .big-beaker-group {
            position: relative;
            width: 650px;
            height: 320px;
            transform-origin: 92% 72%;
        }

        .big-beaker {
            width: 650px;
            display: block;
            z-index: 20;
            pointer-events: auto;
            position: relative;
            cursor: pointer;
        }

        .big-fill {
            position: absolute;
            left: 39%;
            bottom: -30px;
            width: 150px;
            height: 210px;
            border-radius: 0 0 80px 80px;
            overflow: hidden;
            z-index: 30;
            pointer-events: none;
        }

        .big-water {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 120px;
            background: rgba(140, 200, 255, 0.40);
            border-radius: 0 0 80px 80px;
            transition: height 0.9s ease, transform 0.9s ease;
            transform-origin: center bottom;
        }

        .big-water::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 10px;
            background: rgba(255, 255, 255, 0.25);
        }

        @keyframes pourBeakerGroup {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            35% {
                transform: translate(160px, -10px) rotate(32deg);
            }

            70% {
                transform: translate(160px, -10px) rotate(32deg);
            }

            100% {
                transform: translate(0, 0) rotate(0deg);
            }
        }

        @keyframes waterTilt {
            0% {
                transform: rotate(0deg) skewX(0deg);
                height: 120px;
            }

            35% {
                transform: rotate(-22deg) skewX(-8deg);
                height: 95px;
            }

            70% {
                transform: rotate(-22deg) skewX(-8deg);
                height: 95px;
            }

            100% {
                transform: rotate(0deg) skewX(0deg);
                height: 120px;
            }
        }

        .big-beaker-group.pouring {
            animation: pourBeakerGroup 1.6s ease forwards;
        }

        .big-beaker-group.pouring .big-water {
            animation: waterTilt 1.6s ease forwards;
        }

        /* BEAKER KECIL */
        .small-area {
            position: absolute;
            left: 550px;
            bottom: 60px;
            width: 520px;
            height: 240px;
            z-index: 40;
        }

        .small {
            position: absolute;
            width: 200px;
            height: 200px;
            bottom: 0;
            text-align: center;
        }

        .small.s1 {
            left: 0px;
        }

        .small.s2 {
            left: 150px;
        }

        .small.s3 {
            left: 300px;
        }

        .small .ph-top {
            font-weight: 800;
            font-size: 13px;
            margin-bottom: 8px;
            opacity: 0;
            transition: opacity .3s ease;
        }

        .small .ph-top.show {
            opacity: 1;
        }

        .small .label {
            margin-top: 2px;
            font-size: 16px;
            font-weight: 500;
            line-height: 1.1;
        }

        .small .label strong {
            display: block;
            font-weight: 700;
        }

        .small-beaker {
            width: 240px;
            display: block;
            margin: auto;
            position: relative;
            z-index: 30;
            pointer-events: none;
            filter: drop-shadow(0 10px 14px rgba(0, 0, 0, 0.10));
        }

        .small-fill {
            position: absolute;
            left: 60%;
            transform: translateX(-50%);
            bottom: 40px;
            width: 70px;
            height: 78px;
            border-radius: 0 0 22px 22px;
            overflow: hidden;
            z-index: 40;
            pointer-events: none;
        }

        .small-water {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 0px;
            background: rgba(140, 200, 255, 0.35);
            border-radius: 0 0 22px 22px;
            transition: height 1s ease;
        }

        .small-water::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: rgba(255, 255, 255, 0.25);
        }

        /* TOOLS */
        .tools {
            position: absolute;
            left: 630px;
            top: 350px;
            width: 330px;
            height: 120px;
            z-index: 60;
            pointer-events: none;
        }

        .pipet {
            position: absolute;
            width: 120px;
            pointer-events: auto;
            cursor: pointer;
            filter: drop-shadow(0 10px 14px rgba(0, 0, 0, 0.10));
            opacity: .9;
            transition: transform .18s ease, opacity .2s;
            transform: rotate(-20deg);
            transform-origin: 12% 70%;
        }

        .pipet:hover {
            transform: rotate(-20deg) scale(1.03);
        }

        .pipet.p1 {
            left: 0px;
            top: 0px;
        }

        .pipet.p2 {
            left: 140px;
            top: 5px;
        }

        .sprayer {
            position: absolute;
            width: 100px;
            right: -50px;
            top: -20px;
            pointer-events: auto;
            cursor: pointer;
            filter: drop-shadow(0 10px 14px rgba(0, 0, 0, 0.10));
            opacity: .9;
            transition: transform .18s ease, opacity .2s;
        }

        .sprayer:hover {
            transform: scale(1.03);
        }

        .drop {
            position: absolute;
            width: 14px;
            height: 18px;
            background: rgba(60, 140, 255, 0.9);
            border-radius: 50% 50% 50% 50%;
            transform: rotate(20deg);
            opacity: 0;
            z-index: 80;
            pointer-events: none;
        }

        .sprayLine {
            position: absolute;
            right: -40px;
            top: 55px;
            width: 6px;
            height: 0px;
            background: rgba(60, 140, 255, 0.55);
            border-radius: 10px;
            opacity: 0;
            z-index: 70;
            pointer-events: none;
        }

        @keyframes sprayOn {
            0% {
                height: 0px;
                opacity: 0;
            }

            20% {
                height: 120px;
                opacity: 1;
            }

            80% {
                height: 120px;
                opacity: 1;
            }

            100% {
                height: 0px;
                opacity: 0;
            }
        }

        .btn-back {
            position: absolute;
            left: 26px;
            bottom: 24px;
            width: 80px;
            cursor: pointer;
            transition: .2s;
            z-index: 90;
            transform: scaleX(-1);
            filter: drop-shadow(0 12px 16px rgba(0, 0, 0, 0.12));
        }

        .btn-back:hover {
            transform: scaleX(-1) scale(1.06);
        }

        .finish {
            position: absolute;
            left: 990px;
            bottom: 10px;
            background: rgba(120, 170, 150, 0.85);
            color: #fff;
            padding: 14px 22px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.15);
            display: none;
            z-index: 95;
            cursor: pointer;
            text-align: center;
            line-height: 1.2;
        }

        .finish:hover {
            transform: scale(1.02);
        }

        /* HP LANDSCAPE - DISAMAKAN DENGAN TAMPILAN DESKTOP */
        @media (orientation: landscape) and (max-height: 500px) {

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: #dbeeff;
            }

            .container.fit-stage {
                position: absolute;
                width: 1280px;
                height: 720px;
                left: 0;
                top: 0;
                overflow: hidden;
                transform-origin: top left;
            }
        }

        /* MOBILE PORTRAIT */
        @media (orientation: portrait) and (max-width: 700px) {

            html,
            body {
                overflow: hidden;
            }

            .container.fit-stage {
                position: absolute;
                width: 1280px;
                height: 720px;
                left: 0;
                top: 0;
                overflow: hidden;
                transform-origin: top left;
            }

            .music-btn {
                width: 48px;
                height: 48px;
                left: 10px;
                top: 10px;
                border-width: 3px;
            }

            .music-btn svg {
                width: 23px;
                height: 23px;
            }
        }
    </style>
</head>

<body>
    <!-- SOUND -->
    <audio id="bgMusic" src="sound/BACKSOUND VIRTUAL LAB.mp3" loop preload="auto"></audio>
    <audio id="clickSound" src="sound/SUARA KLIK.mp3" preload="auto"></audio>

    <div class="container" id="stage">
        <img src="assets/bg pink.png" class="bg" alt="bg" />

        <button class="music-btn off" id="musicBtn" title="Music" type="button" aria-label="Music">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3v10.55A4 4 0 1 0 14 17V7h6V3h-8z" />
            </svg>
        </button>

        <div class="box-percobaan">
            Percobaan Reaksi:
            <strong id="namaPercobaan">-</strong>
        </div>

        <div class="box-reaksi">
            <div class="title">Persamaan Reaksi:</div>
            <div class="rx-row">
                <div id="rxA">-</div>
                <div class="plus">+</div>
                <div id="rxB">-</div>
            </div>
        </div>

        <div class="instruction-box" id="instructionBox">
            <span>Klik gelas beaker besar untuk menuangkan larutan ke tiga gelas beaker kecil masing-masing sebanyak 20
                mL.</span>
        </div>

        <div class="botol-area">
            <div class="botol-item">
                <div class="mol-card"><img id="molA" src="" alt="senyawa A"></div>
                <img id="botol1" class="botol" src="" alt="botol1">
                <div class="kons-badge" id="kons1">-</div>
            </div>
            <div class="botol-item">
                <div class="mol-card"><img id="molB" src="" alt="senyawa B"></div>
                <img id="botol2" class="botol" src="" alt="botol2">
                <div class="kons-badge" id="kons2">-</div>
            </div>
        </div>

        <div class="big-wrap">
            <div class="big-beaker-pos">
                <div class="big-beaker-group" id="bigBeakerGroup">
                    <div class="big-fill">
                        <div class="big-water" id="bigWater"></div>
                    </div>

                    <img src="assets/beaker final.png" class="big-beaker" id="bigBeaker" alt="beaker besar"
                        title="Klik untuk menuangkan ke gelas kecil">
                </div>
            </div>
        </div>

        <div class="small-area">
            <div class="small s1">
                <div class="ph-top" id="phTop1">pH = -</div>
                <div class="small-fill">
                    <div class="small-water" id="sw1"></div>
                </div>
                <img src="assets/beaker final.png" class="small-beaker" alt="gelas kecil">
                <div class="label">Sedikit <strong>H<sup>+</sup></strong></div>
            </div>

            <div class="small s2">
                <div class="ph-top" id="phTop2">pH = -</div>
                <div class="small-fill">
                    <div class="small-water" id="sw2"></div>
                </div>
                <img src="assets/beaker final.png" class="small-beaker" alt="gelas kecil">
                <div class="label">Sedikit <strong>OH<sup>-</sup></strong></div>
            </div>

            <div class="small s3">
                <div class="ph-top" id="phTop3">pH = -</div>
                <div class="small-fill">
                    <div class="small-water" id="sw3"></div>
                </div>
                <img src="assets/beaker final.png" class="small-beaker" alt="gelas kecil">
                <div class="label">Ditambah <strong>H<sub>2</sub>O</strong></div>
            </div>
        </div>

        <div class="tools">
            <img src="assets/pipet tetes.png" class="pipet p1" id="pipetH" alt="pipet H+"
                title="Klik untuk menetes H+ sebanyak 5 kali">
            <img src="assets/pipet tetes.png" class="pipet p2" id="pipetOH" alt="pipet OH-"
                title="Klik untuk menetes OH- sebanyak 5 kali">
            <img src="assets/akuades.png" class="sprayer" id="sprayer" alt="sprayer H2O"
                title="Klik untuk melakukan pengenceran">
            <div class="sprayLine" id="sprayLine"></div>
        </div>

        <div class="ph-wrap">
            <div class="ph-numbers">
                <div>0</div>
                <div>1</div>
                <div>2</div>
                <div>3</div>
                <div>4</div>
                <div>5</div>
                <div>6</div>
                <div>7</div>
                <div>8</div>
                <div>9</div>
                <div>10</div>
                <div>11</div>
                <div>12</div>
                <div>13</div>
                <div>14</div>
            </div>
            <div class="ph-scale" id="phScale"></div>
            <div class="ph-arrow" id="phArrow"></div>
        </div>

        <div class="ph-value" id="phValue">pH = 0,00</div>

        <img src="assets/tombol_panah_kanan-removebg-preview.png" class="btn-back" alt="back" onclick="kembali()" />

        <div class="finish" id="finishBtn" onclick="keLatihan()">
            Praktikum selesai, lanjut ke latihan soal
        </div>
    </div>

    <script>
        const stage = document.getElementById("stage");
        const musicBtn = document.getElementById("musicBtn");
        const bgMusic = document.getElementById("bgMusic");
        const clickSound = document.getElementById("clickSound");

        let musicOn = false;
        bgMusic.volume = 0.45;
        clickSound.volume = 1;

        function playClickSound() {
            const sound = clickSound.cloneNode();
            sound.volume = 1;
            sound.currentTime = 0;
            sound.play().catch(() => { });

            setTimeout(() => {
                sound.pause();
                sound.currentTime = 0;
            }, 150);
        }

        function playBgMusic() {
            bgMusic.play().then(() => {
                musicOn = true;
                musicBtn.classList.remove("off");
            }).catch(() => {
                musicOn = false;
                musicBtn.classList.add("off");
            });
        }

        function pauseBgMusic() {
            bgMusic.pause();
            musicOn = false;
            musicBtn.classList.add("off");
        }

        musicBtn.addEventListener("click", () => {
            playClickSound();
            if (musicOn) {
                pauseBgMusic();
            } else {
                playBgMusic();
            }
        });

        const DESIGN_WIDTH = 1280;
        const DESIGN_HEIGHT = 720;

        function fitStageToScreen() {
            const shouldFit = window.innerHeight <= 500 || (window.innerWidth <= 700 && window.innerHeight > window.innerWidth);

            if (!shouldFit) {
                stage.classList.remove("fit-stage");
                stage.style.width = "100vw";
                stage.style.height = "100vh";
                stage.style.transform = "";
                return;
            }

            const scale = Math.min(window.innerWidth / DESIGN_WIDTH, window.innerHeight / DESIGN_HEIGHT);
            const x = (window.innerWidth - DESIGN_WIDTH * scale) / 2;
            const y = (window.innerHeight - DESIGN_HEIGHT * scale) / 2;

            stage.classList.add("fit-stage");
            stage.style.width = DESIGN_WIDTH + "px";
            stage.style.height = DESIGN_HEIGHT + "px";
            stage.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
        }

        window.addEventListener("resize", fitStageToScreen);
        window.addEventListener("orientationchange", () => setTimeout(fitStageToScreen, 250));
        fitStageToScreen();

        function pindahHalaman(url) {
            playClickSound();
            stage.style.transition = "opacity 0.18s ease";
            stage.style.opacity = "0";
            setTimeout(() => {
                window.location.href = url;
            }, 180);
        }

        function kembali() {

        let currentPHData = {
            campuran: 0,
            h: 0,
            oh: 0,

        let data = null;
        let basePH = 0;

        let pouredAll = false;
        let dropsH = 0;
        let dropsOH = 0;
        let sprayCount = 0;
        let sprayed = false;

        const SMALL_START_HEIGHT = 28;
        const SMALL_AFTER_ADD_HEIGHT = 42;

        function formatKoma(x) {
            return String(x).replace(".", ",");
        }

        function setInstruction(text) {
            document.getElementById("instructionBox").innerHTML = `<span>${text}</span>`;
        }

        function updateInstruction() {
            if (!pouredAll) {
                setInstruction("Klik gelas beaker besar untuk menuangkan larutan ke tiga gelas beaker kecil masing-masing sebanyak 20 mL.");
            } else if (dropsH < 5) {
                setInstruction("Klik pipet tetes bertanda H<sup>+</sup> satu kali saja, otomatis keluar 5 tetes ke gelas beaker pertama.");
            } else if (dropsOH < 5) {
                setInstruction("Klik pipet tetes bertanda OH<sup>-</sup> satu kali saja, otomatis keluar 5 tetes ke gelas beaker kedua.");
            } else if (sprayCount < 1) {
                setInstruction("Klik akuades (10 mL) bertanda H<sub>2</sub>O pada gelas beaker ketiga untuk melakukan pengenceran.");
            } else {
                setInstruction("Amati perubahan pH dari ketiga gelas beaker tersebut dan catat hasil pHnya.");
            }
        }

        function setPHSidebar(ph) {
            ph = Math.max(0, Math.min(14, ph));
            document.getElementById("phValue").innerText = `pH = ${ph.toFixed(2).replace(".", ",")}`;

            const scale = document.getElementById("phScale");
            const arrow = document.getElementById("phArrow");
            const scaleHeight = scale ? scale.clientHeight : 520;
            const arrowHalf = arrow.offsetHeight ? arrow.offsetHeight / 2 : 10;
            const y = (ph / 14) * (scaleHeight - arrowHalf * 2);
            arrow.style.top = `${y}px`;
        }

        function normalizeKonsentrasi(kons) {
            const angka = Number(String(kons).replace(",", "."));
            if (Number.isNaN(angka)) return "";
            return String(angka);
        }

        function getPHDataFromTable() {
            const s1 = data.s1;
            const s2 = data.s2;

            let acid = null;
            let acidKons = null;
            let saltKons = null;

            if (bufferMap[s1.chem] === s2.chem) {
                acid = s1.chem;
                acidKons = s1.kons;
                saltKons = s2.kons;
            } else if (bufferMap[s2.chem] === s1.chem) {
                acid = s2.chem;
                acidKons = s2.kons;
                saltKons = s1.kons;
            }

            const key = `${normalizeKonsentrasi(acidKons)}|${normalizeKonsentrasi(saltKons)}`;
            const hasilTabel = phTableSemuaLarutan[acid]?.[key];

            if (hasilTabel) return hasilTabel;

            // Cadangan jika data tidak ditemukan di tabel.
            if (!acid || !pKaMap[acid]) {
                return { campuran: 0, h: 0, oh: 0, h2o: 0 };
            }

            const fallbackPH = pKaMap[acid] + Math.log10(Number(saltKons) / Number(acidKons));
            return {
                campuran: fallbackPH,
                h: fallbackPH,
                oh: fallbackPH,
                h2o: fallbackPH
            };
        }

        function computeBasePH() {
            currentPHData = getPHDataFromTable();
            return currentPHData.campuran;
        }

        function loadFromStorage() {
            const raw = localStorage.getItem("buffer_simulasi");

            if (!raw) {
                alert("Data tidak ditemukan. Kembali ke halaman 2.");
                kembali();
                return;
            }

            data = JSON.parse(raw);

            const s1 = data.s1;
            const s2 = data.s2;

            document.getElementById("namaPercobaan").innerText = `${s1.chem} + ${s2.chem}`;
            document.getElementById("rxA").innerText = s1.chem;
            document.getElementById("rxB").innerText = s2.chem;

            document.getElementById("botol1").src = `tabung/${s1.chem}.png`;
            document.getElementById("botol2").src = `tabung/${s2.chem}.png`;

            document.getElementById("kons1").innerText = formatKoma(s1.kons) + " M";
            document.getElementById("kons2").innerText = formatKoma(s2.kons) + " M";

            document.getElementById("molA").src = `senyawa/${s1.chem}.png`;
            document.getElementById("molB").src = `senyawa/${s2.chem}.png`;

            basePH = computeBasePH();

            setPHSidebar(0);
            document.getElementById("bigWater").style.height = "120px";
            updateInstruction();
        }

        function toContainerXY(clientX, clientY) {
            /*
                Perbaikan posisi tetesan air:
                Saat mode HP landscape aktif, .container di-scale dengan transform.
                getBoundingClientRect() menghasilkan posisi yang sudah ter-scale,
                sedangkan elemen .drop dimasukkan ke koordinat asli 1280x720.
                Karena itu koordinat harus dibagi nilai scale agar tetesan jatuh
                tepat ke gelas kecil, bukan melenceng ke kiri/atas.
            */
            const c = stage.getBoundingClientRect();
            const scaleX = c.width / stage.offsetWidth || 1;
            const scaleY = c.height / stage.offsetHeight || 1;

            return {
                x: (clientX - c.left) / scaleX,
                y: (clientY - c.top) / scaleY
            };
        }

        function getFixedPipetTip(toolEl) {
            const r = toolEl.getBoundingClientRect();
            return {
                x: r.left + r.width * 0.55,
                y: r.top + r.height * 0.48
            };
        }

        function getCupDropPoint(targetWaterEl) {
            const r = targetWaterEl.getBoundingClientRect();
            return {
                x: r.left + r.width / 2,
                y: r.top + 8
            };
        }

        function makeDropFromFixedToolToCup(toolId, targetWaterId) {
            const tool = document.getElementById(toolId);
            const targetWater = document.getElementById(targetWaterId);

            if (!tool || !targetWater) return;

            const tip = getFixedPipetTip(tool);
            const tgt = getCupDropPoint(targetWater);

            const start = toContainerXY(tip.x, tip.y);
            const end = toContainerXY(tgt.x, tgt.y);

            const d = document.createElement("div");
            d.className = "drop";
            d.style.left = start.x + "px";
            d.style.top = start.y + "px";

            document.querySelector(".container").appendChild(d);

            d.style.opacity = "1";

            const dx = end.x - start.x;
            const dy = end.y - start.y;

            d.animate([
                {
                    transform: "translate(0px,0px) scale(0.9) rotate(20deg)",
                    opacity: 0
                },
                {
                    transform: "translate(0px,0px) scale(0.95) rotate(20deg)",
                    opacity: 1,
                    offset: 0.18
                },
                {
                    transform: `translate(${dx}px,${dy}px) scale(1.08) rotate(20deg)`,
                    opacity: 0
                }
            ], {
                duration: 650,
                easing: "ease",
                fill: "forwards"
            });

            setTimeout(() => d.remove(), 700);
        }

        function pourAllSmall() {
            playClickSound();
            if (pouredAll) return;

            pouredAll = true;

            const bigGroup = document.getElementById("bigBeakerGroup");
            const bigWater = document.getElementById("bigWater");

            bigGroup.classList.add("pouring");

            setTimeout(() => {
                document.getElementById("sw1").style.height = SMALL_START_HEIGHT + "px";
                document.getElementById("sw2").style.height = SMALL_START_HEIGHT + "px";
                document.getElementById("sw3").style.height = SMALL_START_HEIGHT + "px";

                bigWater.style.height = "58px";

                setPHSidebar(basePH);
                updateInstruction();
            }, 650);

            setTimeout(() => {
                bigGroup.classList.remove("pouring");
                checkFinish();
            }, 1700);
        }

        function showSmallPH() {
            const t1 = document.getElementById("phTop1");
            const t2 = document.getElementById("phTop2");
            const t3 = document.getElementById("phTop3");

            t1.textContent = `pH = ${currentPHData.h.toFixed(2).replace(".", ",")}`;
            t2.textContent = `pH = ${currentPHData.oh.toFixed(2).replace(".", ",")}`;
            t3.textContent = `pH = ${currentPHData.h2o.toFixed(2).replace(".", ",")}`;

            t1.classList.add("show");
            t2.classList.add("show");
            t3.classList.add("show");
        }

        function clickPipetH() {
            playClickSound();
            if (!pouredAll) return;
            if (dropsH >= 5) return;

            // Sekali klik langsung menghasilkan 5 tetes H+
            dropsH = 5;

            document.getElementById("pipetH").style.pointerEvents = "none";
            document.getElementById("pipetH").style.opacity = "0.5";

            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    makeDropFromFixedToolToCup("pipetH", "sw1");
                }, i * 180);
            }

            setTimeout(() => {
                document.getElementById("sw1").style.height = SMALL_AFTER_ADD_HEIGHT + "px";
                setPHSidebar(currentPHData.h);
                updateInstruction();
                checkFinish();
            }, 950);
        }

        function clickPipetOH() {
            playClickSound();
            if (!pouredAll) return;
            if (dropsOH >= 5) return;

            // Sekali klik langsung menghasilkan 5 tetes OH-
            dropsOH = 5;

            document.getElementById("pipetOH").style.pointerEvents = "none";
            document.getElementById("pipetOH").style.opacity = "0.5";

            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    makeDropFromFixedToolToCup("pipetOH", "sw2");
                }, i * 180);
            }

            setTimeout(() => {
                document.getElementById("sw2").style.height = SMALL_AFTER_ADD_HEIGHT + "px";
                setPHSidebar(currentPHData.oh);
                updateInstruction();
                checkFinish();
            }, 950);
        }

        function clickSprayer() {
            playClickSound();
            if (!pouredAll) return;
            if (sprayCount >= 1) return;

            sprayCount++;

            const line = document.getElementById("sprayLine");

            line.style.animation = "none";
            void line.offsetWidth;
            line.style.animation = "sprayOn 1.0s ease forwards";

            sprayed = true;

            document.getElementById("sw3").style.height = SMALL_AFTER_ADD_HEIGHT + "px";
            document.getElementById("sprayer").style.pointerEvents = "none";
            document.getElementById("sprayer").style.opacity = "0.5";

            setPHSidebar(currentPHData.h2o);
            updateInstruction();
            checkFinish();
        }

        function checkFinish() {
            if (!pouredAll) return;

            const done = dropsH >= 5 && dropsOH >= 5 && sprayCount >= 1;

            if (done) {
                sprayed = true;
                showSmallPH();
                updateInstruction();
                document.getElementById("finishBtn").style.display = "block";
            }
        }

        window.addEventListener("resize", () => {
            setPHSidebar(basePH || 0);
        });

        loadFromStorage();

        document.getElementById("bigBeaker").addEventListener("click", pourAllSmall);
        document.getElementById("pipetH").addEventListener("click", clickPipetH);
        document.getElementById("pipetOH").addEventListener("click", clickPipetOH);
        document.getElementById("sprayer").addEventListener("click", clickSprayer);
