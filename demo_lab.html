<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Simulasi Larutan Buffer</title>

    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI';
            background: #eef2f7;
            overflow: hidden;
        }

        /* =========================
           BACKGROUND / UKURAN LAYAR
           Bagian ini untuk menyamakan ukuran tampilan
           dengan background seperti pembahasan.html
           ========================= */
        :root {
            --stage-w: 1200;
            --stage-h: 675;
            --stage-scale: 1;
        }

        .viewport {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #eef2f7;
        }

        /* CONTAINER */
        .container {
            position: relative;
            width: calc(var(--stage-w) * 1px);
            height: calc(var(--stage-h) * 1px);
            margin: 0;
            overflow: hidden;
            flex: 0 0 auto;
            transform: scale(var(--stage-scale));
            transform-origin: center center;
            border-radius: 8px;
            background: #ffffff;
        }

        /* BACKGROUND */
        .bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            z-index: 0;
            pointer-events: none;
        }

        .container>*:not(.bg) {
            z-index: 1;
        }

        /* =========================
           PANEL PILIH LARUTAN
           ========================= */
        .panel-wrap {
            position: absolute;
            top: 20px;
            left: 0;
            z-index: 1000;
            transition: transform .25s ease;
            transform: translateX(0);
        }

        .panel-wrap.closed {
            transform: translateX(-200px);
        }

        .panel-buffer {
            width: 200px;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid rgba(0, 0, 0, 0.35);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
            padding: 6px;
        }

        .panel-buffer ol {
            margin: 0;
            padding-left: 25px;
        }

        .panel-buffer li {
            margin: 8px 0;
            font-size: 15px;
            cursor: default;
        }

        /* Larutan yang tidak dipakai dibuat abu-abu */
        .panel-buffer li.disabled-larutan {
            color: #9b9b9b;
        }

        /* TAB HIJAU VERTIKAL */
        .panel-tab {
            position: absolute;
            top: 18px;
            right: -46px;
            width: 46px;
            height: 150px;
            background: #cfe6c2;
            border: 2px solid rgba(0, 0, 0, 0.35);
            border-left: none;
            border-radius: 0 12px 12px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
        }

        .panel-tab .tab-text {
            transform: rotate(90deg);
            font-weight: 700;
            color: #1f1f1f;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .panel-tab .tab-arrow {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 20px;
            font-weight: 900;
            color: #1f1f1f;
        }

        /* =========================
           KONSENTRASI
           ========================= */
        .konsentrasi {
            position: absolute;
            top: 35px;
            left: 260px;
            z-index: 900;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .konsentrasi .pill-title {
            padding: 8px 22px;
            border-radius: 20px;
            background: linear-gradient(#eef1f6, #cfd6e1);
            border: 2px solid rgba(0, 0, 0, 0.18);
            box-shadow:
                inset 0 2px 0 rgba(255, 255, 255, 0.85),
                0 6px 12px rgba(0, 0, 0, 0.12);
            font-weight: 700;
            color: #5b616d;
            margin-bottom: 8px;
        }

        .konsentrasi .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .konsentrasi button {
            min-width: 5px;
            height: 26px;
            padding: 0 10px;
            border-radius: 16px;
            border: 2px solid rgba(0, 0, 0, 0.18);
            background: linear-gradient(#ffffff, #dfe6f2);
            color: #4f5662;
            font-weight: 700;
            cursor: pointer;

            box-shadow:
                inset 0 2px 0 rgba(255, 255, 255, 0.95),
                0 4px 10px rgba(0, 0, 0, 0.10);
            transition: transform .15s ease, filter .15s ease;
        }

        .konsentrasi button:hover {
            transform: scale(1.07);
        }

        .konsentrasi button:active {
            transform: scale(0.98);
        }

        /* SLOT */
        .slot {
            position: absolute;
            bottom: 100px;
            width: 120px;
            height: 160px;
            border: 3px dashed #aaa;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #slot1 {
            left: 150px;
        }

        #slot2 {
            left: 300px;
        }

        .slot img {
            width: 140%;
            cursor: pointer;
        }

        /* HASIL */
        #hasil {
            position: absolute;
            bottom: 40px;
            left: 150px;
            width: 250px;
            padding: 15px;
            border-radius: 15px;
            color: white;
            text-align: center;
            background: gray;
            font-weight: bold;
        }

        /* BOTOL */
        .rak-botol img {
            cursor: pointer;
            transition: 0.3s;
        }

        .rak-botol img:hover {
            transform: scale(1.1);
        }

        /* Botol yang tidak bisa diklik */
        .rak-botol img.disabled-bottle {
            filter: grayscale(100%);
            opacity: 0.55;
            cursor: not-allowed;
            pointer-events: none;
        }

        .rak-botol img.disabled-bottle:hover {
            transform: none;
        }

        /* NEXT */
        .tombol-kiri {
            position: absolute;
            left: 40px;
            bottom: 40px;
            width: 100px;
            cursor: pointer;
            transform: scaleX(-1);
            transition: 0.3s;
        }

        .tombol-kiri:hover {
            transform: scaleX(-1) scale(1.15);
        }

        .tombol-kanan {
            position: absolute;
            right: 40px;
            bottom: 40px;
            width: 100px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tombol-kanan:hover {
            transform: scale(1.15);
        }
    </style>
</head>

<body>

    <div class="viewport">
        <div class="container">

            <img src="assets/rak-lab.png" class="bg">

            <!-- PANEL PILIH LARUTAN -->
            <div class="panel-wrap" id="panelWrap">
                <div class="panel-buffer">
                    <ol>
                        <li>HCOOH + HCOONa</li>
                        <li class="disabled-larutan">CH<sub>3</sub>COOH + CH<sub>3</sub>COONa</li>
                        <li class="disabled-larutan">H<sub>2</sub>CO<sub>3</sub> + NaHCO<sub>3</sub></li>
                        <li class="disabled-larutan">NH<sub>4</sub>OH + NH<sub>4</sub>Cl</li>
                        <li class="disabled-larutan">H<sub>3</sub>PO<sub>4</sub> + NaH<sub>2</sub>PO<sub>4</sub></li>
                        <li class="disabled-larutan">HNO<sub>2</sub> + NaNO<sub>2</sub></li>
                        <li class="disabled-larutan">HF + NaF</li>
                    </ol>
                </div>

                <!-- TAB HIJAU -->
                <div class="panel-tab" onclick="togglePanel()">
                    <div class="tab-text">Pilih Larutan</div>
                    <div class="tab-arrow">›</div>
                </div>
            </div>

            <!-- KONSENTRASI -->
            <div class="konsentrasi">
                <div class="pill-title">Konsentrasi</div>

                <div class="btn-row">
                    <button onclick="setKonsentrasi(this)">0.1</button>
                    <button onclick="setKonsentrasi(this)">0.25</button>
                    <button onclick="setKonsentrasi(this)">0.5</button>
                    <button onclick="setKonsentrasi(this)">0.75</button>
                    <button onclick="setKonsentrasi(this)">1</button>
                </div>
            </div>

            <!-- BOTOL -->
            <div class="rak-botol">
                <img src="tabung/HCOOH.png" data-chem="HCOOH"
                    style="position:absolute;bottom:370px;left:600px;width:120px;" onclick="pilihBotol(this)">

                <img src="tabung/HCOONa.png" data-chem="HCOONa"
                    style="position:absolute;bottom:500px;left:800px;width:120px;" onclick="pilihBotol(this)">

                <!-- Botol lain dibuat abu-abu dan tidak bisa diklik -->
                <img src="tabung/NaF.png" data-chem="NaF" class="disabled-bottle"
                    style="position:absolute;bottom:500px;left:880px;width:120px;">

                <img src="tabung/CH3COOH.png" data-chem="CH3COOH" class="disabled-bottle"
                    style="position:absolute;bottom:250px;left:1000px;width:120px;">

                <img src="tabung/CH3COONa.png" data-chem="CH3COONa" class="disabled-bottle"
                    style="position:absolute;bottom:500px;left:960px;width:120px;">

                <img src="tabung/H2CO3.png" data-chem="H2CO3" class="disabled-bottle"
                    style="position:absolute;bottom:250px;left:800px;width:120px;">

                <img src="tabung/NaHCO3.png" data-chem="NaHCO3" class="disabled-bottle"
                    style="position:absolute;bottom:370px;left:730px;width:120px;">

                <img src="tabung/NH4OH.png" data-chem="NH4OH" class="disabled-bottle"
                    style="position:absolute;bottom:120px;left:1000px;width:120px;">

                <img src="tabung/NH4Cl.png" data-chem="NH4Cl" class="disabled-bottle"
                    style="position:absolute;bottom:370px;left:665px;width:120px;">

                <img src="tabung/H3PO4.png" data-chem="H3PO4" class="disabled-bottle"
                    style="position:absolute;bottom:370px;left:530px;width:120px;">

                <img src="tabung/HNO2.png" data-chem="HNO2" class="disabled-bottle"
                    style="position:absolute;bottom:120px;left:930px;width:120px;">

                <img src="tabung/HF.png" data-chem="HF" class="disabled-bottle"
                    style="position:absolute;bottom:250px;left:730px;width:120px;">

                <img src="tabung/NaNO2.png" data-chem="NaNO2" class="disabled-bottle"
                    style="position:absolute;bottom:120px;left:860px;width:120px;">

                <img src="tabung/NaH2PO4.png" data-chem="NaH2PO4" class="disabled-bottle"
                    style="position:absolute;bottom:370px;left:800px;width:120px;">
            </div>

            <!-- SLOT -->
            <div id="slot1" class="slot"></div>
            <div id="slot2" class="slot"></div>

            <!-- HASIL -->
            <div id="hasil">Pilih larutan pertama</div>

            <img src="assets/tombol_panah_kanan-removebg-preview.png" class="tombol-kiri" onclick="keMenu()">
            <img src="assets/tombol_panah_kanan-removebg-preview.png" class="tombol-kanan" onclick="lanjut()">

        </div>
    </div>

    <script>
        function resizeStage() {
            const baseW = 1200;
            const baseH = 675;
            const scale = Math.min(window.innerWidth / baseW, window.innerHeight / baseH);
            document.documentElement.style.setProperty('--stage-scale', scale);
        }

        window.addEventListener('load', resizeStage);
        window.addEventListener('resize', resizeStage);

        function togglePanel() {
            document.getElementById('panelWrap').classList.toggle('closed');
        }

        let slotData = {
            1: { chem: null, kons: null },
            2: { chem: null, kons: null }
        };

        let slotAktif = null;

        const bufferMap = {
            HCOOH: "HCOONa"
        };

        /* PILIH BOTOL */
        function pilihBotol(img) {

            let targetSlot = !slotData[1].chem ? 1 : (!slotData[2].chem ? 2 : null);

            if (!targetSlot) {
                alert("Slot penuh!");
                return;
            }

            let slotEl = document.getElementById("slot" + targetSlot);

            let isi = document.createElement("img");
            isi.src = img.src;

            isi.onclick = () => {
                hapusSlot(targetSlot, img);
            };

            slotEl.innerHTML = "";
            slotEl.appendChild(isi);

            slotData[targetSlot].chem = img.dataset.chem;
            slotData[targetSlot].kons = null;

            slotAktif = targetSlot;

            img.style.display = "none";

            updateHasil();
        }

        /* HAPUS SLOT */
        function hapusSlot(n, botol) {

            document.getElementById("slot" + n).innerHTML = "";

            slotData[n] = { chem: null, kons: null };

            botol.style.display = "block";

            slotAktif = null;

            document.getElementById("hasil").innerText = "Pilih 2 larutan + konsentrasi";
            document.getElementById("hasil").style.background = "gray";
        }

        function updateHasil() {

            let hasil = document.getElementById("hasil");

            let s1 = slotData[1];
            let s2 = slotData[2];

            if (!s1.chem) {
                hasil.innerText = "Pilih larutan pertama";
                hasil.style.background = "gray";
                return;
            }

            if (!s1.kons) {
                hasil.innerText = "Pilih konsentrasi larutan pertama";
                hasil.style.background = "orange";
                return;
            }

            if (!s2.chem) {
                hasil.innerText = "Pilih larutan kedua";
                hasil.style.background = "gray";
                return;
            }

            if (!s2.kons) {
                hasil.innerText = "Pilih konsentrasi larutan kedua";
                hasil.style.background = "orange";
                return;
            }

            if (bufferMap[s1.chem] === s2.chem || bufferMap[s2.chem] === s1.chem) {
                hasil.innerText = "✅ Buffer terbentuk";
                hasil.style.background = "green";
            } else {
                hasil.innerText = "❌ Bukan buffer";
                hasil.style.background = "red";
            }
        }

        /* KONSENTRASI */
        function setKonsentrasi(btn) {

            if (!slotAktif) {
                alert("Pilih botol dulu!");
                return;
            }

            let nilai = parseFloat(btn.innerText);

            slotData[slotAktif].kons = nilai;

            let slotEl = document.getElementById("slot" + slotAktif);

            let oldLabel = slotEl.querySelector(".label-konsentrasi");
            if (oldLabel) {
                oldLabel.remove();
            }

            let label = document.createElement("div");
            label.className = "label-konsentrasi";
            label.innerText = nilai + " M";
            label.style.position = "absolute";
            label.style.bottom = "5px";
            label.style.background = "#2b7cff";
            label.style.color = "white";
            label.style.padding = "2px 6px";
            label.style.borderRadius = "10px";
            label.style.fontSize = "12px";

            slotEl.appendChild(label);

            updateHasil();
        }

        function keMenu() {
            window.location.href = "menu.html";
        }

        function lanjut() {
            if (!slotData[1].chem || !slotData[2].chem) {
                alert("Pilih 2 larutan dulu!");
                return;
            }

            if (!slotData[1].kons || !slotData[2].kons) {
                alert("Pilih konsentrasi tiap larutan dulu!");
                return;
            }

            if (!(bufferMap[slotData[1].chem] === slotData[2].chem || bufferMap[slotData[2].chem] === slotData[1].chem)) {
                alert("Larutan yang dipilih belum sesuai. Pilih HCOOH dan HCOONa.");
                return;
            }

            const payload = {
                s1: slotData[1],
                s2: slotData[2],
                ts: Date.now()
            };

            localStorage.setItem("buffer_simulasi", JSON.stringify(payload));

            window.location.href = "demo2.html";
        }
    </script>

</body>

</html>
